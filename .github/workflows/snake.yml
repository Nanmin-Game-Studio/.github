name: Contribution Snake (pipeline.svg)

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: madushansivam   # <-- replace with your PERSONAL github username
          outputs: |
            /tmp/publish/pipeline.svg
            /tmp/publish/pipeline-dark.svg?palette=github-dark

      - name: Publish to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          if git ls-remote --exit-code --heads origin output > /dev/null 2>&1; then
            git checkout -B output origin/output
          else
            git checkout --orphan output
            git rm -rf . > /dev/null 2>&1 || true
          fi
          cp /tmp/publish/pipeline.svg ./pipeline.svg
          cp /tmp/publish/pipeline-dark.svg ./pipeline-dark.svg
          git add pipeline.svg pipeline-dark.svg
          git commit -m "chore: update pipeline.svg" || echo "no changes to commit"
          git push origin output
