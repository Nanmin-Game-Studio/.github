name: 3D Contribution Graph
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate 3D graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: madushansivam
      - name: Rename output to cube.svg
        run: |
          mkdir -p /tmp/publish
          cp profile-3d-contrib/profile-night-green.svg /tmp/publish/cube.svg
      - name: Publish to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          if git ls-remote --exit-code --heads origin output > /dev/null 2>&1; then
            git checkout -B output origin/output
          else
            git checkout --orphan output
            git rm -rf . > /dev/null 2>&1 || true
          fi
          cp /tmp/publish/cube.svg ./cube.svg
          git add cube.svg
          git commit -m "chore: update cube.svg" || echo "no changes to commit"
          git push origin output
